<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Reviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Poppins,sans-serif;
  background:#0f3d1f;
  color:white;
  padding:20px;
}

h1{text-align:center}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.card{
  background:white;
  color:black;
  padding:15px;
  border-radius:15px;
  margin:10px 0;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

.stars span{
  font-size:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top-bar">
  <h1>Teacher Reviews</h1>
  <button onclick="openAdmin()">Admin Panel</button>
</div>

<div id="teacherList"></div>

<hr>

<h2>Submit Review</h2>

<input id="name" placeholder="Your Name">
<input id="class" placeholder="Class">
<input id="section" placeholder="Section">

<label><input type="checkbox" id="anon"> Be Anonymous</label>

<div class="stars" id="stars"></div>

<textarea id="reason" placeholder="Enter reason"></textarea>

<button onclick="submitReview()">Submit</button>

<hr>

<h2>Reviews</h2>
<div id="reviews"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selectedRating = 0;
let selectedTeacher = "";

// ⭐ Stars
const starDiv = document.getElementById("stars");
for(let i=1;i<=5;i++){
  let span=document.createElement("span");
  span.innerHTML="★";
  span.onclick=()=>{selectedRating=i; highlightStars()};
  starDiv.appendChild(span);
}

function highlightStars(){
  [...starDiv.children].forEach((s,i)=>{
    s.style.color = i<selectedRating ? "gold" : "gray";
  });
}

// 📄 Load teachers.txt
fetch("teachers.txt")
.then(res=>res.text())
.then(data=>{
  let teachers=data.split("\n");
  let list=document.getElementById("teacherList");

  teachers.forEach(t=>{
    if(!t.trim()) return;

    let [name,gender]=t.split(":");

    let div=document.createElement("div");
    div.className="card";
    div.innerHTML=`${name} (${gender})`;

    div.onclick=()=>{
      selectedTeacher=name;
      loadReviews();
    }

    list.appendChild(div);
  });
});

// 📤 Submit
function submitReview(){
  if(!selectedTeacher) return alert("Select teacher first");
  if(selectedRating===0) return alert("Give rating");

  const anon=document.getElementById("anon").checked;

  let data={
    teacher:selectedTeacher,
    name: anon ? "Anonymous" : document.getElementById("name").value,
    class: anon ? "Hidden" : document.getElementById("class").value,
    section: anon ? "Hidden" : document.getElementById("section").value,
    rating:selectedRating,
    reason:document.getElementById("reason").value,
    time:Date.now()
  };

  db.ref("reviews").push(data);
  alert("Submitted");
}

// 🔄 Load reviews realtime
function loadReviews(){
  const container=document.getElementById("reviews");

  db.ref("reviews").on("value",snap=>{
    container.innerHTML="";

    snap.forEach(child=>{
      let d=child.val();

      if(d.teacher!==selectedTeacher) return;

      let div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
      <b>${d.name}</b> (${d.class}-${d.section})<br>
      ⭐ ${d.rating}/5 <br>
      ${d.reason}
      `;

      container.appendChild(div);
    });
  });
}

// 🔐 Admin
function openAdmin(){
  let pass=prompt("Enter Password");

  if(pass!=="2x8js92ns9210nnkal92") return alert("Wrong");

  db.ref("reviews").once("value",snap=>{
    let data="";
    snap.forEach(c=>{
      let d=c.val();
      data+=`${d.name} - ${d.teacher} - ${d.reason}\n`;
    });

    alert(data);
  });
}
</script>

</body>
</html>
