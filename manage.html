<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Review</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:linear-gradient(135deg,#0f3d1f,#1f6b3a);
  color:white;
}

/* MAIN */
.container{
  max-width:800px;
  margin:auto;
  padding:20px;
  padding-bottom:120px;
}

h1{
  text-align:center;
  font-weight:800;
}

/* BUTTON */
.btn{
  padding:14px 22px;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg,#ffe777,#ffd54f);
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}
.btn:active{transform:scale(0.94)}

/* CARD */
.review-card{
  background:white;
  color:black;
  padding:16px;
  border-radius:18px;
  margin:12px 0;
  position:relative;
  animation:fadeUp .3s ease;
}

/* DELETE */
.delete-btn{
  position:absolute;
  top:8px;
  right:8px;
  background:red;
  color:white;
  border:none;
  border-radius:10px;
  padding:5px 10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(6px);
  justify-content:center;
  align-items:flex-end;
}

/* IOS STYLE SHEET */
.modal-box{
  background:white;
  color: black;
  width:100%;
  max-width:500px;
  border-radius:25px 25px 0 0;
  padding:20px;
  animation:slideUp .25s ease;
}

/* RADIO FIX */
.radio-group{
  margin:10px 0;
}
.radio-group label{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 0;
  font-size:17px;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #;
  font-size:16px;
}

/* BUTTON ROW */
.btn-row{
  display:flex;
  gap:10px;
  margin-top:15px;
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
}
.loader div{
  width:40px;
  height:40px;
  border:4px solid rgba(255,255,255,0.3);
  border-top:4px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

/* ADMIN BAR SAFE */
.admin-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:10px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  text-align:center;
  background:rgba(0,0,0,0.2);
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}}
@keyframes slideUp{from{transform:translateY(100%)}}
</style>
</head>

<body>

<div class="container">
  <h1>Review</h1>

  <div id="reviews"></div>
  <p id="noReviews">No reviews yet</p>

  <button class="btn" onclick="openModal()">Write a Review</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h3>Select Type</h3>

    <div class="radio-group">
      <label>School <input type="radio" name="type" value="school"></label>
      <label>Website <input type="radio" name="type" value="website"></label>
      <label>Teacher <input type="radio" name="type" value="teacher"></label>
      <label>Other <input type="radio" name="type" value="other"></label>
    </div>

    <div id="formArea"></div>

    <div class="btn-row">
      <button class="btn" onclick="submitReview()">Submit</button>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>

  </div>
</div>

<!-- ADMIN -->
<div class="admin-bar">
  <span onclick="adminLogin()">I am a admin</span>
</div>

<!-- LOADER -->
<div class="loader" id="loader" style="display:none;">
  <div></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCub1n6Mpm4T2G6jpM65MEvzUuxt55pJ5I",
  authDomain: "evergreen-high-school.firebaseapp.com",
  projectId: "evergreen-high-school"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let selectedType = "";
let isAdmin = false;
let adminCode = "";

// Load admin code
fetch("https://raw.githubusercontent.com/hazik-mir/hazik-mir.github.io/main/authcode")
.then(r=>r.text()).then(t=>adminCode=t.trim());

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function adminLogin(){
  document.getElementById("loader").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    let input = prompt("Enter Admin Code:");
    if(input === adminCode){
      isAdmin = true;
      alert("Admin Enabled");
      loadReviews();
    } else alert("Wrong Code");
  },3000);
}

document.querySelectorAll("input[name='type']").forEach(r=>{
  r.onchange = e=>{
    selectedType = e.target.value;
    renderForm();
  };
});

function renderForm(){
  let html = `<input id="yourName" placeholder="Your Name">`;

  if(selectedType==="teacher"){
    html += `<input id="teacherName" placeholder="Teacher Name">`;
  }

  html += `<textarea id="reviewText" placeholder="Write review"></textarea>`;
  document.getElementById("formArea").innerHTML = html;
}

function submitReview(){
  let name = document.getElementById("yourName").value;
  let review = document.getElementById("reviewText").value;

  if(!name || !review || !selectedType){
    alert("Fill all fields");
    return;
  }

  db.collection("reviews").add({
    name, review, type:selectedType, time:Date.now()
  });

  closeModal();
}

function loadReviews(){
  db.collection("reviews").orderBy("time","desc")
  .onSnapshot(snap=>{
    let div=document.getElementById("reviews");
    div.innerHTML="";

    if(snap.empty){
      document.getElementById("noReviews").style.display="block";
      return;
    }

    document.getElementById("noReviews").style.display="none";

    snap.forEach(doc=>{
      let d=doc.data();
      let el=document.createElement("div");
      el.className="review-card";

      el.innerHTML=`<b>${d.name}</b>: ${d.review}`;

      if(isAdmin){
        let btn=document.createElement("button");
        btn.innerText="Delete";
        btn.className="delete-btn";
        btn.onclick=()=>db.collection("reviews").doc(doc.id).delete();
        el.appendChild(btn);
      }

      div.appendChild(el);
    });
  });
}

loadReviews();
</script>

</body>
</html>
